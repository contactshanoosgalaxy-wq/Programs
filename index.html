<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remind Pro 📅</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8; --bg2: #ede8de; --card: #ffffff; --cardBorder: #e8e0d0;
            --text: #2c2416; --textSub: #8c7a5e; --textMuted: #c4b89a;
            --accent: #c27c3a; --accentSoft: rgba(194, 124, 58, 0.12);
            --green: #5a8a4e; --greenSoft: rgba(90, 138, 78, 0.1);
            --orange: #b8621a; --red: #c0444a;
            --shadow: 0 4px 32px rgba(160, 130, 80, 0.15);
            --inputBg: #faf7f2; --navBg: #f5f0e8ee;
        }

        .dark-mode {
            --bg: #0e1117; --bg2: #161b27; --card: #1c2333; --cardBorder: #262f45;
            --text: #f0f4ff; --textSub: #7a8aaa; --textMuted: #3d4a65;
            --accent: #4f8ef7; --accentSoft: rgba(79, 142, 247, 0.15);
            --green: #34d399; --greenSoft: rgba(52, 211, 153, 0.12);
            --orange: #fb923c; --red: #f87171;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.45);
            --inputBg: #161b27; --navBg: #0e1117ee;
        }

        body {
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg);
            color: var(--text); transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        nav {
            position: sticky; top: 0; z-index: 100; background: var(--navBg);
            backdrop-filter: blur(14px); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--cardBorder);
        }

        .toggle-box {
            width: 50px; height: 26px; border-radius: 50px; position: relative;
            cursor: pointer; background: var(--bg2); border: 1.5px solid var(--cardBorder);
        }
        .toggle-knob {
            position: absolute; top: 2.5px; left: 3px; width: 18px; height: 18px;
            border-radius: 50%; background: var(--accent); transition: 0.3s;
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        .dark-mode .toggle-knob { left: 26px; }

        .container { padding: 20px; max-width: 460px; margin: 0 auto; padding-bottom: 100px; }
        .hidden { display: none !important; }

        /* SEARCH BAR */
        .search-container { margin-bottom: 15px; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1.5px solid var(--cardBorder); background: var(--card);
            color: var(--text); font-family: 'Quicksand'; outline: none; box-sizing: border-box;
        }

        /* FILTER CHIPS */
        .filter-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 16px; border-radius: 20px; background: var(--card);
            border: 1.5px solid var(--cardBorder); font-size: 0.85rem; font-weight: 700;
            white-space: nowrap; cursor: pointer; color: var(--textSub);
        }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .event-card {
            background: var(--card); border-radius: 20px; padding: 18px;
            margin-bottom: 12px; border: 1px solid var(--cardBorder);
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }

        .fab {
            position: fixed; bottom: 30px; right: 24px; width: 60px; height: 60px;
            border-radius: 50%; background: var(--accent); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; border: none; box-shadow: 0 8px 24px var(--accentSoft);
            cursor: pointer; z-index: 90;
        }

        .btn-full {
            width: 100%; padding: 16px; border-radius: 50px; border: none;
            font-family: 'Quicksand'; font-size: 1rem; font-weight: 700;
            background: var(--accent); color: white; cursor: pointer;
            margin-top: 10px; box-shadow: 0 4px 15px var(--accentSoft);
        }

        input, select {
            width: 100%; padding: 14px; border-radius: 15px; border: 1.5px solid var(--cardBorder);
            background: var(--inputBg); color: var(--text); font-family: 'Quicksand';
            font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 15px;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); z-index: 200; display: flex;
            align-items: flex-end; justify-content: center;
        }
        .modal {
            background: var(--card); width: 100%; max-width: 460px;
            border-radius: 24px 24px 0 0; padding: 30px 20px 40px; text-align: center;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800;">📅 Remind Pro</div>
    <div class="toggle-box" onclick="toggleTheme()">
        <div class="toggle-knob" id="knob">☀️</div>
    </div>
</nav>

<div class="container" id="home-screen">
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by name..." oninput="renderEvents()">
    </div>
    
    <div class="filter-scroll">
        <div class="chip active" onclick="setFilter('All', this)">All</div>
        <div class="chip" onclick="setFilter('Marriage', this)">💒 Marriage</div>
        <div class="chip" onclick="setFilter('Meeting', this)">🤝 Meeting</div>
        <div class="chip" onclick="setFilter('Birthday', this)">🎂 Birthday</div>
        <div class="chip" onclick="setFilter('Other', this)">📋 Other</div>
    </div>

    <div id="event-list"></div>
    
    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button onclick="exportData()" style="flex: 1; padding: 10px; border-radius: 15px; border: 1px solid var(--cardBorder); background: var(--card); font-family: 'Quicksand'; font-size: 0.8rem; font-weight: 700; color: var(--textSub);">💾 Backup Data</button>
        <button onclick="importData()" style="flex: 1; padding: 10px; border-radius: 15px; border: 1px solid var(--cardBorder); background: var(--card); font-family: 'Quicksand'; font-size: 0.8rem; font-weight: 700; color: var(--textSub);">📂 Restore</button>
    </div>

    <button class="fab" onclick="showAddScreen()">+</button>
</div>

<div class="container hidden" id="add-screen">
    <button onclick="showHomeScreen()" style="background:none; border:none; color:var(--accent); font-weight:700; margin-bottom:20px;">← Back</button>
    <h2>New Event</h2>
    <select id="fType">
        <option value="Marriage">💒 Marriage</option>
        <option value="Meeting">🤝 Meeting</option>
        <option value="Birthday">🎂 Birthday</option>
        <option value="Other">📋 Other</option>
    </select>
    <input type="text" id="fName" placeholder="Name (e.g. Thomas)">
    <input type="date" id="fDate">
    <input type="text" id="fNote" placeholder="Note (e.g. Bring gift)">
    <button class="btn-full" onclick="saveEvent()">✅ Save & Sync Calendar</button>
</div>

<div class="overlay hidden" id="detail-overlay">
    <div class="modal">
        <h3 id="detail-title"></h3>
        <p id="detail-info" style="color: var(--textSub); white-space: pre-line;"></p>
        <button class="btn-full" id="whatsapp-btn" style="background: #25D366;">💬 Share to WhatsApp</button>
        <button class="btn-full" style="background: var(--bg2); color: var(--red);" onclick="triggerDelete()">🗑️ Delete Event</button>
        <button class="btn-full" style="background: transparent; color: var(--textSub);" onclick="closeDetail()">Close</button>
    </div>
</div>

<script>
    const SK = "remind_v4";
    let events = JSON.parse(localStorage.getItem(SK)) || [];
    let activeEvent = null;
    let currentFilter = "All";

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('knob').innerText = isDark ? '🌙' : '☀️';
        localStorage.setItem('remind_theme', isDark ? 'dark' : 'cream');
    }

    if (localStorage.getItem('remind_theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('knob').innerText = '🌙';
    }

    function showHomeScreen() {
        document.getElementById('add-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
        renderEvents();
    }

    function showAddScreen() {
        document.getElementById('fName').value = "";
        document.getElementById('fDate').value = "";
        document.getElementById('fNote').value = "";
        document.getElementById('fType').value = "Marriage";
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('add-screen').classList.remove('hidden');
    }

    function setFilter(type, el) {
        currentFilter = type;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderEvents();
    }

    function getDaysLeft(dateStr) {
        const today = new Date(); today.setHours(0,0,0,0);
        const target = new Date(dateStr); target.setHours(0,0,0,0);
        return Math.ceil((target - today) / 86400000);
    }

    function renderEvents() {
        const list = document.getElementById('event-list');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        events.sort((a,b) => new Date(a.date) - new Date(b.date));
        
        const filtered = events.filter(e => {
            const matchesFilter = currentFilter === "All" || e.type === currentFilter;
            const matchesSearch = e.personName.toLowerCase().includes(searchTerm);
            return matchesFilter && matchesSearch;
        });

        filtered.forEach(ev => {
            const days = getDaysLeft(ev.date);
            const emojis = { "Marriage": "💒", "Meeting": "🤝", "Birthday": "🎂", "Other": "📋" };
            const card = document.createElement('div');
            card.className = `event-card`;
            card.onclick = () => openDetail(ev);
            
            card.innerHTML = `
                <div style="font-size:2rem;">${emojis[ev.type]}</div>
                <div style="flex:1;">
                    <div style="font-weight:800;">${ev.personName}'s ${ev.type}</div>
                    <div style="font-size:0.8rem; color:var(--textSub);">${new Date(ev.date).toDateString()}</div>
                </div>
                <div class="badge" style="background:${days<=1? 'var(--red)':'var(--accentSoft)'}; color:${days<=1?'white':'var(--accent)'}">
                    ${days === 0 ? 'TODAY' : days === 1 ? 'Tomorrow' : days + 'd'}
                </div>
            `;
            list.appendChild(card);
        });
    }

    function openDetail(ev) {
        activeEvent = ev;
        document.getElementById('detail-overlay').classList.remove('hidden');
        document.getElementById('detail-title').innerText = `${ev.personName}'s ${ev.type}`;
        document.getElementById('detail-info').innerText = `${new Date(ev.date).toDateString()}\n${ev.note ? '📝 ' + ev.note : ''}`;
        
        const msg = `🔔 Reminder: ${ev.personName}'s ${ev.type} is on ${new Date(ev.date).toDateString()}! ${ev.note ? 'Note: ' + ev.note : ''}`;
        document.getElementById('whatsapp-btn').onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function saveEvent() {
        const name = document.getElementById('fName').value;
        const date = document.getElementById('fDate').value;
        const type = document.getElementById('fType').value;
        const note = document.getElementById('fNote').value;

        if (!name || !date) return alert("Please fill Name and Date!");

        events.push({ id: Date.now(), personName: name, date, type, note });
        localStorage.setItem(SK, JSON.stringify(events));

        const d = date.replace(/-/g,"");
        const gLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name+"'s "+type)}&dates=${d}/${d}&details=${encodeURIComponent(note || "")}`;
        
        showHomeScreen();
        window.open(gLink, '_blank');
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(events));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href",     dataStr);
        downloadAnchorNode.setAttribute("download", "remind_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsText(file,'UTF-8');
            reader.onload = readerEvent => {
                const content = readerEvent.target.result;
                events = JSON.parse(content);
                localStorage.setItem(SK, JSON.stringify(events));
                renderEvents();
            }
        }
        input.click();
    }

    function triggerDelete() {
        events = events.filter(e => e.id !== activeEvent.id);
        localStorage.setItem(SK, JSON.stringify(events));
        closeDetail();
        renderEvents();
    }

    function closeDetail() { document.getElementById('detail-overlay').classList.add('hidden'); }

    renderEvents();
</script>
</body>
</html>
