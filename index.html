<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remind Pro 📅</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f5f0e8; --bg2: #ede8de; --card: #ffffff; --cardBorder: #e8e0d0;
            --text: #2c2416; --textSub: #8c7a5e; --textMuted: #c4b89a;
            --accent: #c27c3a; --accentSoft: rgba(194, 124, 58, 0.12);
            --green: #5a8a4e; --greenSoft: rgba(90, 138, 78, 0.1);
            --orange: #b8621a; --red: #c0444a;
            --shadow: 0 4px 32px rgba(160, 130, 80, 0.15);
            --inputBg: #faf7f2; --navBg: #f5f0e8ee;
        }
        .dark-mode {
            --bg: #0e1117; --bg2: #161b27; --card: #1c2333; --cardBorder: #262f45;
            --text: #f0f4ff; --textSub: #7a8aaa; --textMuted: #3d4a65;
            --accent: #4f8ef7; --accentSoft: rgba(79, 142, 247, 0.15);
            --green: #34d399; --greenSoft: rgba(52, 211, 153, 0.12);
            --orange: #fb923c; --red: #f87171;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.45);
            --inputBg: #161b27; --navBg: #0e1117ee;
        }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        nav { position: sticky; top: 0; z-index: 100; background: var(--navBg); backdrop-filter: blur(14px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cardBorder); }
        .container { padding: 20px; max-width: 460px; margin: 0 auto; padding-bottom: 100px; }
        .hidden { display: none !important; }

        .search-input { width: 100%; padding: 12px 20px; border-radius: 30px; margin-bottom: 15px; border: 1.5px solid var(--cardBorder); background: var(--card); color: var(--text); font-family: 'Quicksand'; outline: none; box-sizing: border-box; }
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 16px; border-radius: 20px; background: var(--card); border: 1.5px solid var(--cardBorder); font-size: 0.85rem; font-weight: 700; white-space: nowrap; cursor: pointer; color: var(--textSub); }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* IMAGE TEMPLATE (HIDDEN) */
        #share-template { position: absolute; left: -9999px; width: 450px; padding: 50px; background: white; border-radius: 40px; text-align: center; border: 12px solid #f5f0e8; }
        #share-custom-msg { margin-top: 25px; padding: 15px; border-radius: 15px; background: #fff5f7; color: #c0444a; font-weight: 700; font-size: 1.1rem; border: 2px dashed #ffc2d1; display: none; }

        .event-card { background: var(--card); border-radius: 22px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--cardBorder); box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .fab { position: fixed; bottom: 30px; right: 24px; width: 62px; height: 62px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; border: none; box-shadow: 0 8px 24px var(--accentSoft); cursor: pointer; z-index: 90; }
        .btn-full { width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Quicksand'; font-size: 1rem; font-weight: 700; background: var(--accent); color: white; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1.5px solid var(--cardBorder); background: var(--inputBg); color: var(--text); font-family: 'Quicksand'; font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
        .modal { background: var(--card); width: 100%; max-width: 460px; border-radius: 28px 28px 0 0; padding: 30px 20px 40px; text-align: center; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="share-template">
    <div style="font-size: 6rem;" id="share-emoji">💒</div>
    <h1 style="font-size: 2.8rem; margin: 15px 0; color: #2c2416;" id="share-title-text">Event Title</h1>
    <div style="font-size: 1.6rem; color: #8c7a5e; font-weight: bold;" id="share-date">Date</div>
    <div style="margin-top: 25px; padding: 20px; background: #faf7f2; border-radius: 20px; font-size: 1.1rem; color: #555;" id="share-note">Note</div>
    <div id="share-custom-msg"></div>
    <div style="margin-top: 45px; font-weight: 800; color: #c27c3a; letter-spacing: 1px;" id="share-footer">REMIND PRO ✨</div>
</div>

<nav>
    <div style="font-weight: 800;">📅 Remind Pro</div>
    <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">☀️</div>
</nav>

<div class="container" id="home-screen">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search events..." oninput="renderEvents()">
    <div class="filter-scroll">
        <div class="chip active" onclick="setFilter('All', this)">All</div>
        <div class="chip" onclick="setFilter('Marriage', this)">💒 Marriage</div>
        <div class="chip" onclick="setFilter('Meeting', this)">🤝 Meeting</div>
        <div class="chip" onclick="setFilter('Birthday', this)">🎂 Birthday</div>
        <div class="chip" onclick="setFilter('Other', this)">📋 Other</div>
    </div>
    <div id="event-list"></div>
    <button class="fab" onclick="showAddScreen()">+</button>
</div>

<div class="container hidden" id="add-screen">
    <button onclick="showHomeScreen()" style="background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer; margin-bottom:20px;">← Back</button>
    <h2>New Event</h2>
    <select id="fType">
        <option value="Marriage">💒 Marriage</option>
        <option value="Meeting">🤝 Meeting</option>
        <option value="Birthday">🎂 Birthday</option>
        <option value="Other">📋 Other</option>
    </select>
    <input type="text" id="fName" placeholder="Name">
    <input type="date" id="fDate">
    <input type="text" id="fNote" placeholder="Note (optional)">
    <button class="btn-full" onclick="saveEvent()">✅ Save & Sync</button>
</div>

<div class="overlay hidden" id="detail-overlay">
    <div class="modal">
        <h3 id="detail-title" style="margin-bottom: 5px;"></h3>
        <p id="detail-info" style="color: var(--textSub); white-space: pre-line; margin-bottom: 20px;"></p>
        
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-left: 5px;">Message for the card (removes "Reminder"):</label>
            <textarea id="custom-share-input" placeholder="e.g. Hope to see you there! ❤️" style="margin-top:5px; height: 70px;"></textarea>
        </div>

        <button class="btn-full" id="share-img-btn" style="background: #25D366;">🖼️ Share Visual Card</button>
        <button class="btn-full" style="background: var(--bg2); color: var(--red); box-shadow:none;" onclick="triggerDelete()">🗑️ Remove Event</button>
        <button class="btn-full" style="background: transparent; color: var(--textSub); box-shadow:none;" onclick="closeDetail()">Close</button>
    </div>
</div>

<script>
    const SK = "remind_v4";
    let events = JSON.parse(localStorage.getItem(SK)) || [];
    let activeEvent = null;
    let currentFilter = "All";

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('remind_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'cream');
    }

    if (localStorage.getItem('remind_theme') === 'dark') document.body.classList.add('dark-mode');

    function showHomeScreen() {
        document.getElementById('add-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
        renderEvents();
    }

    function showAddScreen() {
        document.getElementById('fName').value = ""; document.getElementById('fDate').value = ""; document.getElementById('fNote').value = "";
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('add-screen').classList.remove('hidden');
    }

    function setFilter(type, el) {
        currentFilter = type;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderEvents();
    }

    function renderEvents() {
        const list = document.getElementById('event-list');
        const term = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        events.sort((a,b) => new Date(a.date) - new Date(b.date));
        
        events.filter(e => (currentFilter === "All" || e.type === currentFilter) && e.personName.toLowerCase().includes(term)).forEach(ev => {
            const days = Math.ceil((new Date(ev.date) - new Date().setHours(0,0,0,0)) / 86400000);
            const emojis = { "Marriage": "💒", "Meeting": "🤝", "Birthday": "🎂", "Other": "📋" };
            list.innerHTML += `<div class="event-card" onclick="openDetail(${JSON.stringify(ev).replace(/"/g, '&quot;')})">
                <div style="font-size:2.2rem;">${emojis[ev.type]}</div>
                <div style="flex:1;"><b>${ev.personName}'s ${ev.type}</b><br><small>${new Date(ev.date).toDateString()}</small></div>
                <div style="background:${days<=1?'var(--red)':'var(--accentSoft)'}; color:${days<=1?'white':'var(--accent)'}; padding:5px 12px; border-radius:50px; font-size:0.7rem; font-weight:700;">${days === 0 ? 'Today' : days + 'd'}</div>
            </div>`;
        });
    }

    function openDetail(ev) {
        activeEvent = ev;
        document.getElementById('custom-share-input').value = "";
        document.getElementById('detail-overlay').classList.remove('hidden');
        document.getElementById('detail-title').innerText = `${ev.personName}'s ${ev.type}`;
        document.getElementById('detail-info').innerText = `${new Date(ev.date).toDateString()}\n${ev.note || ''}`;
        document.getElementById('share-img-btn').onclick = () => generateImage(ev);
    }

    async function generateImage(ev) {
        const btn = document.getElementById('share-img-btn');
        const customMsg = document.getElementById('custom-share-input').value;
        btn.innerText = "Creating Card... ⏳";

        const emojis = { "Marriage": "💒", "Meeting": "🤝", "Birthday": "🎂", "Other": "📋" };
        document.getElementById('share-emoji').innerText = emojis[ev.type];
        document.getElementById('share-date').innerText = new Date(ev.date).toDateString();
        document.getElementById('share-note').innerText = ev.note || "Save the date!";
        
        const titleDiv = document.getElementById('share-title-text');
        const msgDiv = document.getElementById('share-custom-msg');
        
        // SMART LOGIC: If message exists, remove "Reminder" and show message
        if(customMsg.trim()) {
            titleDiv.innerText = `${ev.personName}'s ${ev.type}`; // Personal title only
            msgDiv.innerText = `"${customMsg}"`;
            msgDiv.style.display = "block";
            document.getElementById('share-footer').innerText = `FROM: ${localStorage.getItem('pookie_vault') ? JSON.parse(localStorage.getItem('pookie_vault')).name : 'REMIND PRO'} ✨`;
        } else {
            titleDiv.innerText = `REMINDER: ${ev.personName}'s ${ev.type}`; // Keep "Reminder"
            msgDiv.style.display = "none";
            document.getElementById('share-footer').innerText = `REMIND PRO ✨`;
        }
        
        try {
            const canvas = await html2canvas(document.getElementById('share-template'), { scale: 2 });
            const blob = await (await fetch(canvas.toDataURL())).blob();
            const file = new File([blob], "event_card.png", { type: "image/png" });
            if (navigator.share) {
                await navigator.share({ files: [file], title: 'Event Card' });
            } else {
                alert("Please open this in a mobile browser (Chrome/Safari) to share cards!");
            }
        } catch (e) {
            alert("Oops! Could not create the card. Try again.");
        }
        btn.innerText = "🖼️ Share Visual Card";
    }

    function saveEvent() {
        const name = document.getElementById('fName').value;
        const date = document.getElementById('fDate').value;
        if (!name || !date) return alert("Please fill Name and Date!");
        events.push({ id: Date.now(), personName: name, date, type: document.getElementById('fType').value, note: document.getElementById('fNote').value });
        localStorage.setItem(SK, JSON.stringify(events));
        window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name+"'s "+document.getElementById('fType').value)}&dates=${date.replace(/-/g,"")}/${date.replace(/-/g,"")}`, '_blank');
        showHomeScreen();
    }

    function triggerDelete() { events = events.filter(e => e.id !== activeEvent.id); localStorage.setItem(SK, JSON.stringify(events)); closeDetail(); renderEvents(); }
    function closeDetail() { document.getElementById('detail-overlay').classList.add('hidden'); }
    renderEvents();
</script>
</body>
</html>
